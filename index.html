<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MinionDLC | Чит-клиент нового поколения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
            color: #eef2ff;
            line-height: 1.5;
            scroll-behavior: smooth;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid rgba(74, 144, 226, 0.2);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD166, #4A90E2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            background: rgba(20, 28, 40, 0.8);
            backdrop-filter: blur(4px);
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            border: 1px solid rgba(74, 144, 226, 0.3);
        }

        .btn-primary {
            background: linear-gradient(95deg, #4A90E2, #7C4DFF);
            border: none;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #4A90E2;
        }

        .btn-outline:hover {
            background: rgba(74, 144, 226, 0.15);
        }

        .btn-danger {
            background: rgba(220, 53, 69, 0.2);
            border-color: #dc3545;
        }

        .btn-danger:hover {
            background: #dc3545;
        }

        .btn-success {
            background: linear-gradient(95deg, #2ecc71, #27ae60);
            border: none;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 204, 113, 0.4);
        }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 70px 0 50px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF, #A0C4FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 700px;
            color: #b9c7d9;
            margin-bottom: 32px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }

        .feature-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 28px 20px;
            border: 1px solid rgba(74, 144, 226, 0.3);
            transition: 0.2s;
            text-align: center;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .pricing-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            margin: 40px 0 60px;
        }

        .price-card {
            background: rgba(12, 20, 32, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 28px 20px;
            width: 200px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .price-card:hover {
            transform: scale(1.02);
            border-color: #4A90E2;
            box-shadow: 0 10px 25px -5px rgba(74, 144, 226, 0.3);
        }

        .price-name {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .price-value {
            font-size: 2rem;
            font-weight: 800;
            color: #FFD166;
            margin: 16px 0;
        }

        .card-form {
            background: rgba(10, 18, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px;
            max-width: 450px;
            margin: 40px auto;
            border: 1px solid #2d3a5e;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: #0f172a;
            border: 1px solid #2d3a5e;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #4A90E2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.3);
        }

        .dashboard {
            background: rgba(8, 14, 22, 0.7);
            border-radius: 36px;
            padding: 32px;
            margin: 40px 0;
            border: 1px solid #2a3a5a;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }

        .active-sub {
            color: #8effb2;
            font-weight: bold;
        }

        .message {
            background: #1f2a3e;
            border-radius: 28px;
            padding: 12px 20px;
            margin: 16px 0;
            text-align: center;
        }

        .error-msg {
            background: #3e1a24;
            color: #ffb3b3;
        }

        .success-msg {
            background: #1a3a2a;
            color: #b3ffcf;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: #0f172ad9;
            border-radius: 48px;
            max-width: 520px;
            width: 90%;
            padding: 32px 28px;
            border: 1px solid rgba(74, 144, 226, 0.6);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(16px);
            position: relative;
        }

        .modal-content h3 {
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
        }

        .payment-option {
            background: #1e2a3a;
            border-radius: 32px;
            padding: 20px;
            margin: 16px 0;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .payment-option:hover {
            border-color: #4A90E2;
            background: #253649;
            transform: scale(1.01);
        }

        .payment-option h4 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .payment-detail {
            font-size: 14px;
            color: #aab7d4;
            word-break: break-all;
        }

        .key-input-area {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #3a4a6a;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            position: absolute;
            right: 20px;
            top: 16px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 40px 0 20px;
            border-top: 1px solid #1e2a3a;
            margin-top: 40px;
            color: #7e8aa8;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 680px) {
            .hero h1 { font-size: 2.4rem; }
            .navbar { flex-direction: column; }
            .info-row { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <div class="logo">⚡ MINION DLC</div>
        <div class="nav-buttons" id="navButtons"></div>
    </div>
    <div id="mainContent"></div>
    <footer>© 2025 MinionDLC — передовой чит-клиент. Работает на GitHub Pages</footer>
</div>

<script>
    (function() {
        // ==================== КОНСТАНТЫ ====================
        const STORAGE_USERS = "minion_users";
        const STORAGE_CURRENT_USER = "minion_current_user";
        const STORAGE_NEXT_UID = "minion_next_uid";
        const STORAGE_LICENSE_KEYS = "minion_license_keys";

        // ССЫЛКА ДЛЯ СКАЧИВАНИЯ (ЗАМЕНИТЕ НА ВАШУ РЕАЛЬНУЮ ССЫЛКУ)
        const DOWNLOAD_LINK = "https://github.com/yourusername/yourrepo/releases/download/v1.0/MinionDLC_Setup.exe";
        
        // Платежные реквизиты
        const FUNPAY_LINK = "https://funpay.com/lots/offer?id=66748595";
        const SBP_CARD_NUMBER = "2202208429604110";

        // ==================== БАЗА ДАННЫХ (localStorage) ====================
        function initLicenseKeys() {
            if (!localStorage.getItem(STORAGE_LICENSE_KEYS)) {
                const defaultKeys = {
                    "MINION-DEMO-1DAY": { plan: "1 день", used: false, usedBy: null, createdAt: Date.now() },
                    "MINION-DEMO-7DAYS": { plan: "7 дней", used: false, usedBy: null, createdAt: Date.now() },
                    "MINION-YEAR-GOLD": { plan: "1 год", used: false, usedBy: null, createdAt: Date.now() },
                    "MINION-FOREVER-X": { plan: "Навсегда", used: false, usedBy: null, createdAt: Date.now() },
                    "TEST-WEEK-777": { plan: "7 дней", used: false, usedBy: null, createdAt: Date.now() },
                    "FREE-TRIAL-24H": { plan: "1 день", used: false, usedBy: null, createdAt: Date.now() }
                };
                localStorage.setItem(STORAGE_LICENSE_KEYS, JSON.stringify(defaultKeys));
            }
        }

        function getLicenseKeys() {
            return JSON.parse(localStorage.getItem(STORAGE_LICENSE_KEYS)) || {};
        }

        function saveLicenseKeys(keys) {
            localStorage.setItem(STORAGE_LICENSE_KEYS, JSON.stringify(keys));
        }

        function getUsers() {
            return JSON.parse(localStorage.getItem(STORAGE_USERS)) || [];
        }

        function saveUsers(users) {
            localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
        }

        function getNextUid() {
            let next = parseInt(localStorage.getItem(STORAGE_NEXT_UID));
            return isNaN(next) ? 1 : next;
        }

        function incrementNextUid() {
            let cur = getNextUid();
            localStorage.setItem(STORAGE_NEXT_UID, (cur + 1).toString());
        }

        function getCurrentUser() {
            const uid = localStorage.getItem(STORAGE_CURRENT_USER);
            if (!uid) return null;
            const users = getUsers();
            return users.find(u => u.uid == uid) || null;
        }

        function setCurrentUser(uid) {
            if (uid) localStorage.setItem(STORAGE_CURRENT_USER, uid);
            else localStorage.removeItem(STORAGE_CURRENT_USER);
        }

        function isSubscriptionActive(user) {
            if (!user || !user.subscription || !user.subscription.active) return false;
            if (user.subscription.plan === "Навсегда") return true;
            if (user.subscription.expiry && typeof user.subscription.expiry === 'number') {
                return Date.now() < user.subscription.expiry;
            }
            return false;
        }

        function refreshSubscriptionsStatus() {
            let users = getUsers();
            let changed = false;
            users.forEach(user => {
                if (user.subscription && user.subscription.active && user.subscription.expiry && user.subscription.plan !== "Навсегда") {
                    if (Date.now() > user.subscription.expiry) {
                        user.subscription.active = false;
                        changed = true;
                    }
                }
            });
            if (changed) saveUsers(users);
            const curr = getCurrentUser();
            if (curr) {
                const updatedCurr = getUsers().find(u => u.uid === curr.uid);
                if (updatedCurr && !isSubscriptionActive(updatedCurr) && updatedCurr.subscription?.active === false) {
                    setCurrentUser(updatedCurr.uid);
                }
            }
        }

        function purchaseSubscriptionByPlan(user, planLabel) {
            const plansMap = {
                "1 день": { days: 1, label: "1 день" },
                "7 дней": { days: 7, label: "7 дней" },
                "1 год": { days: 365, label: "1 год" },
                "Навсегда": { days: null, label: "Навсегда" }
            };
            const planData = plansMap[planLabel];
            if (!planData) return false;
            
            let expiry = null;
            if (planData.days !== null) {
                expiry = Date.now() + (planData.days * 24 * 60 * 60 * 1000);
            }
            
            let users = getUsers();
            const index = users.findIndex(u => u.uid === user.uid);
            if (index !== -1) {
                users[index].subscription = {
                    active: true,
                    plan: planData.label,
                    expiry: expiry,
                    activatedAt: Date.now()
                };
                saveUsers(users);
                setCurrentUser(users[index].uid);
                return true;
            }
            return false;
        }

        function activateKey(user, licenseKey, expectedPlan) {
            const keys = getLicenseKeys();
            const keyData = keys[licenseKey];
            if (!keyData) {
                return { success: false, msg: "❌ Неверный ключ активации" };
            }
            if (keyData.used) {
                return { success: false, msg: "❌ Этот ключ уже был использован" };
            }
            if (keyData.plan !== expectedPlan) {
                return { success: false, msg: `❌ Ключ предназначен для тарифа "${keyData.plan}", а вы пытаетесь активировать "${expectedPlan}"` };
            }
            const success = purchaseSubscriptionByPlan(user, keyData.plan);
            if (success) {
                keyData.used = true;
                keyData.usedBy = user.nickname + " (UID:" + user.uid + ")";
                keyData.usedAt = Date.now();
                keys[licenseKey] = keyData;
                saveLicenseKeys(keys);
                return { success: true, msg: `✅ Подписка "${keyData.plan}" успешно активирована по ключу!` };
            } else {
                return { success: false, msg: "❌ Ошибка активации подписки" };
            }
        }

        function initDatabase() {
            if (!localStorage.getItem(STORAGE_USERS)) {
                const testUser = {
                    uid: 1,
                    nickname: "TestGamer",
                    email: "test@minion.ru",
                    subscription: { active: true, plan: "Навсегда", expiry: null, activatedAt: Date.now() },
                    registeredAt: Date.now()
                };
                localStorage.setItem(STORAGE_USERS, JSON.stringify([testUser]));
                localStorage.setItem(STORAGE_NEXT_UID, "2");
            }
            if (!localStorage.getItem(STORAGE_NEXT_UID)) {
                let maxUid = 1;
                const users = getUsers();
                if (users.length) maxUid = Math.max(...users.map(u => u.uid)) + 1;
                localStorage.setItem(STORAGE_NEXT_UID, maxUid.toString());
            }
            initLicenseKeys();
        }

        function registerUser(email, nickname) {
            const users = getUsers();
            if (!email || !nickname) return { success: false, msg: "Заполните email и ник" };
            if (!email.includes('@') || !email.includes('.')) return { success: false, msg: "Введите корректный email" };
            if (users.some(u => u.email.toLowerCase() === email.toLowerCase())) return { success: false, msg: "Email уже зарегистрирован" };
            if (nickname.trim().length < 3) return { success: false, msg: "Ник должен быть минимум 3 символа" };
            
            const uid = getNextUid();
            incrementNextUid();
            const newUser = {
                uid: uid,
                nickname: nickname.trim(),
                email: email.trim().toLowerCase(),
                subscription: { active: false, plan: null, expiry: null },
                registeredAt: Date.now()
            };
            users.push(newUser);
            saveUsers(users);
            setCurrentUser(uid);
            return { success: true, msg: "Регистрация успешна!", user: newUser };
        }

        function loginUser(email) {
            const users = getUsers();
            const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());
            if (!user) return { success: false, msg: "Пользователь с таким email не найден" };
            setCurrentUser(user.uid);
            return { success: true, msg: "Добро пожаловать!", user };
        }

        function logout() {
            setCurrentUser(null);
            renderApp();
        }

        function downloadClient() {
            window.open(DOWNLOAD_LINK, '_blank');
        }

        // ==================== МОДАЛЬНОЕ ОКНО ====================
        function showPaymentModal(planName, price, user, onComplete) {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal-overlay';
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <button class="close-modal" id="closeModalBtn">&times;</button>
                    <h3>💸 Выберите способ оплаты</h3>
                    <div class="payment-option" id="optionFunpay">
                        <h4>🎮 Ключ / FunPay</h4>
                        <div class="payment-detail">Введите лицензионный ключ, приобретённый на FunPay</div>
                    </div>
                    <div id="keyInputArea" style="display:none;" class="key-input-area">
                        <div class="input-group">
                            <label>🔑 Введите ключ активации</label>
                            <input type="text" id="licenseKeyInput" placeholder="XXXX-XXXX-XXXX">
                        </div>
                        <button class="btn btn-primary" id="activateKeyBtn" style="width:100%">Активировать ключ</button>
                        <div id="keyMessage" class="message" style="margin-top:12px; display:none;"></div>
                    </div>
                    <div class="payment-option" id="optionSbp">
                        <h4>🏦 СБП (Перевод по номеру карты)</h4>
                        <div class="payment-detail">Переведите ${price} ₽ на карту с указанием назначения:</div>
                        <div class="payment-detail" style="background:#00000055; padding:8px; border-radius:20px; margin-top:10px;">
                            📌 <strong>Номер карты:</strong> ${SBP_CARD_NUMBER}<br>
                            📝 <strong>Назначение:</strong> «${user.nickname} | ${planName} | MinionDLC»
                        </div>
                        <div class="payment-detail" style="margin-top:10px;">✅ После перевода нажмите "Я оплатил" для активации подписки.</div>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button class="btn btn-primary" id="confirmSbpBtn" style="flex:1;">✅ Я оплатил (СБП)</button>
                        <button class="btn btn-outline" id="cancelPaymentBtn" style="flex:1;">Отмена</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);

            const closeModal = () => modalDiv.remove();
            document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
            document.getElementById('cancelPaymentBtn')?.addEventListener('click', closeModal);

            const funpayOption = document.getElementById('optionFunpay');
            const keyArea = document.getElementById('keyInputArea');
            funpayOption?.addEventListener('click', () => {
                if (keyArea) keyArea.style.display = 'block';
                window.open(FUNPAY_LINK, '_blank');
            });

            const activateBtn = document.getElementById('activateKeyBtn');
            const keyInput = document.getElementById('licenseKeyInput');
            const keyMsgDiv = document.getElementById('keyMessage');
            
            activateBtn?.addEventListener('click', () => {
                const enteredKey = keyInput?.value.trim().toUpperCase();
                if (!enteredKey) {
                    if(keyMsgDiv) { keyMsgDiv.style.display = 'block'; keyMsgDiv.className = 'message error-msg'; keyMsgDiv.innerText = 'Введите ключ'; }
                    return;
                }
                const result = activateKey(user, enteredKey, planName);
                if (result.success) {
                    if(keyMsgDiv) { keyMsgDiv.style.display = 'block'; keyMsgDiv.className = 'message success-msg'; keyMsgDiv.innerText = result.msg; }
                    setTimeout(() => {
                        closeModal();
                        if (onComplete) onComplete(true);
                        else renderApp();
                    }, 1500);
                } else {
                    if(keyMsgDiv) { keyMsgDiv.style.display = 'block'; keyMsgDiv.className = 'message error-msg'; keyMsgDiv.innerText = result.msg; }
                }
            });

            document.getElementById('confirmSbpBtn')?.addEventListener('click', () => {
                const success = purchaseSubscriptionByPlan(user, planName);
                closeModal();
                if (success) {
                    if (onComplete) onComplete(true);
                    else {
                        alert(`✅ Подписка "${planName}" успешно активирована! Спасибо за покупку через СБП.`);
                        renderApp();
                    }
                } else {
                    alert("❌ Ошибка активации, обратитесь в поддержку.");
                }
            });

            document.getElementById('optionSbp')?.addEventListener('click', () => {
                navigator.clipboard.writeText(SBP_CARD_NUMBER).catch(() => {});
                const tempMsg = document.createElement('div');
                tempMsg.className = 'message success-msg';
                tempMsg.innerText = 'Номер карты скопирован!';
                tempMsg.style.marginTop = '10px';
                modalDiv.querySelector('.modal-content')?.appendChild(tempMsg);
                setTimeout(() => tempMsg.remove(), 1500);
            });
        }

        // ==================== ОСНОВНОЙ РЕНДЕР ====================
        function renderApp() {
            refreshSubscriptionsStatus();
            const currentUser = getCurrentUser();
            const navDiv = document.getElementById('navButtons');
            
            if (currentUser) {
                navDiv.innerHTML = `
                    <span style="display: inline-flex; align-items: center; gap: 8px; background:#1e2a3a; padding: 0 16px; border-radius: 40px;">
                        👤 ${escapeHtml(currentUser.nickname)} (UID:${currentUser.uid})
                    </span>
                    <button class="btn btn-outline" id="navDashboardBtn">📁 Кабинет</button>
                    <button class="btn btn-danger" id="logoutBtn">🚪 Выйти</button>
                `;
                document.getElementById('navDashboardBtn')?.addEventListener('click', () => renderDashboard());
                document.getElementById('logoutBtn')?.addEventListener('click', logout);
            } else {
                navDiv.innerHTML = `
                    <button class="btn btn-outline" id="navLoginBtn">Вход</button>
                    <button class="btn btn-primary" id="navRegisterBtn">Регистрация</button>
                `;
                document.getElementById('navLoginBtn')?.addEventListener('click', () => renderLogin());
                document.getElementById('navRegisterBtn')?.addEventListener('click', () => renderRegister());
            }
            
            const hash = window.location.hash;
            if (currentUser && (hash === '#dashboard' || hash === '')) {
                renderDashboard();
            } else if (currentUser && hash === '#pricing') {
                renderPricingWithUser(currentUser);
            } else if (!currentUser) {
                if (hash === '#register') renderRegister();
                else if (hash === '#login') renderLogin();
                else renderLanding();
            } else {
                renderDashboard();
            }
        }

        function renderLanding() {
            const contentDiv = document.getElementById('mainContent');
            contentDiv.innerHTML = `
